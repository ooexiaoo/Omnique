name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps
        run: |
          case ${{ matrix.target }} in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            x86_64-pc-windows-gnu)
              sudo apt-get install -y mingw-w64
              echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
              ;;
          esac

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          strip target/${{ matrix.target }}/release/omnique
          tar czf omnique-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release omnique

      - name: Strip and package (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/omnique
          tar czf omnique-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release omnique

      - name: Strip and package (Windows)
        if: matrix.ext == '.exe'
        run: |
          x86_64-w64-mingw32-strip target/${{ matrix.target }}/release/omnique.exe
          zip -j omnique-${{ matrix.target }}.zip target/${{ matrix.target }}/release/omnique.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            omnique-${{ matrix.target }}.tar.gz
            omnique-${{ matrix.target }}.zip
          draft: true
