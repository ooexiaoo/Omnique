name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.ext == ''
        run: |
          strip target/${{ matrix.target }}/release/omnique${{ matrix.ext }}
          tar czf omnique-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release omnique${{ matrix.ext }}

      - name: Package (Windows)
        if: matrix.ext == '.exe'
        run: |
          zip -j omnique-${{ matrix.target }}.zip target/${{ matrix.target }}/release/omnique${{ matrix.ext }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            omnique-${{ matrix.target }}.tar.gz
            omnique-${{ matrix.target }}.zip
          draft: true
